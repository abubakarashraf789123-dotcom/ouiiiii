<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D Chair AR</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
    }
    model-viewer {
      width: 100%;
      height: 100vh;
      --poster-color: #ffffff;
    }
    #ar-button {
      background-color: #ffffff;
      border-radius: 12px;
      border: none;
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 28px;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0px 2px 8px rgba(0,0,0,0.3);
      cursor: pointer;
    }
    model-viewer::part(default-progress-bar) {
      display: block;
    }
  </style>
</head>
<body>

  <model-viewer
    src="chair.glb"
    alt="3D Chair Model"
    auto-rotate
    rotation-per-second="30deg"
    camera-controls
    touch-action="pan-y"
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="auto"
    ar-placement="floor">

    <button id="ar-button" slot="ar-button">
      👋 View in your space
    </button>

  </model-viewer>

</body>
</html>
